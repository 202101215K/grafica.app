<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portafolio de Tareas</title>
<style>
    body{
        margin:0;
        font-family: 'Segoe UI', sans-serif;
        background:#0f172a;
        color:white;
    }

    header{
        background:#020617;
        padding:25px;
        text-align:center;
        border-bottom:2px solid #1e293b;
    }

    .nombre{
        font-size:26px;
        font-weight:bold;
    }

    .curso{
        font-size:14px;
        color:#38bdf8;
    }

    .contenedor{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
        gap:25px;
        padding:30px;
    }

    .card{
        background:#1e293b;
        border-radius:15px;
        overflow:hidden;
        transition:0.3s;
        box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    .card:hover{
        transform:translateY(-8px);
    }

    .card img{
        width:100%;
        height:180px;
        object-fit:cover;
    }

    .contenido{
        padding:15px;
    }

    .semana{
        font-size:13px;
        color:#38bdf8;
        margin-bottom:5px;
    }

    .titulo{
        font-size:18px;
        font-weight:bold;
        margin-bottom:8px;
    }

    .fecha{
        font-size:12px;
        color:#94a3b8;
        margin-bottom:10px;
    }

    .boton{
        display:inline-block;
        padding:8px 12px;
        background:#38bdf8;
        color:black;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
    }

    .boton:hover{
        background:#0ea5e9;
    }
</style>
</head>
<body>

<header>
    <div class="nombre">FERNANDO HUACHACA PACHECO</div>
    <div class="curso">CURSO: COMPUTACION GRAFICA</div>
</header>

<div class="contenedor">

    <!-- TAREA 1 -->
    <div class="card" data-fecha="2026-04-10">
        <img src="https://cdn0.uncomo.com/es/posts/0/9/0/como_realizar_un_grafico_de_barras_en_excel_2007_15090_600.jpg">
        <div class="contenido">
            <div class="semana"></div>
            <div class="titulo">Gráfico de Barras Dinámico</div>
            <div class="fecha"></div>
            <a href="grafico_barras.html" class="boton">Ver tarea</a>
        </div>
    </div>

    <!-- TAREA 2 -->
    <div class="card" data-fecha="2026-04-10">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSt2PSviSPgAabjeBUEiZxx_xgiN4NzVmYViw&s">
        <div class="contenido">
            <div class="semana"></div>
            <div class="titulo">Puntos en Movimiento</div>
            <div class="fecha"></div>
            <a href="puntosmovimiento.html" class="boton">Ver tarea</a>
        </div>
    </div>

    <!-- TAREA 3 -->
    <div class="card" data-fecha="2026-04-12">
        <img src="https://interactivechaos.com/sites/default/files/pictures/funcion_coseno.png">
        <div class="contenido">
            <div class="semana"></div>
            <div class="titulo">Curva Coseno Dinámica</div>
            <div class="fecha"></div>
            <a href="coseno.html" class="boton">Ver tarea</a>
        </div>
    </div>

</div>

<script>
// FECHA BASE DEL CURSO
const inicioCurso = new Date("2026-04-10");

// FORMATEAR FECHA
function formatearFecha(fecha) {
    return fecha.toLocaleDateString('es-ES', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    });
}

// CALCULAR SEMANA
function calcularSemana(fechaTarea) {
    const diferencia = fechaTarea - inicioCurso;
    const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    return Math.floor(dias / 7) + 1;
}

// PROCESAR TARJETAS
document.querySelectorAll(".card").forEach(card => {
    const fechaTexto = card.getAttribute("data-fecha");
    const fecha = new Date(fechaTexto);

    const semana = calcularSemana(fecha);

    card.querySelector(".semana").textContent = "Semana " + semana;
    card.querySelector(".fecha").textContent = "Creado: " + formatearFecha(fecha);
});
</script>

</body>
</html>
