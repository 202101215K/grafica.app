<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta 3 - Transformaciones combinadas interactivas</title>
<style>
body {
margin: 0;
overflow: hidden;
font-family: Arial, sans-serif;
}
#info { 
position: absolute;
top: 10px;
left: 10px;
background: rgba(236, 233, 233, 0.85);
padding: 10px;
border-radius: 8px;
font-size: 14px;
}
#info h2 {
margin: 0 0 5px 0;
font-size: 16px;
}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
    // ESCENA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20232a);
    
    // CÁMARA
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    
    // RENDERIZADOR
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    // CUBO
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshNormalMaterial();
    const cubo = new THREE.Mesh(geometry, material);
    scene.add(cubo);
    
    // LUZ
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    
    // ========== CONTROLES DE TECLADO ==========
    window.addEventListener('keydown', (event) => {
        switch(event.key) {
            // TRASLACIÓN (movimiento)
            case 'ArrowUp':
                cubo.position.y += 0.2;
                break;
            case 'ArrowDown':
                cubo.position.y -= 0.2;
                break;
            case 'ArrowLeft':
                cubo.position.x -= 0.2;
                break;
            case 'ArrowRight':
                cubo.position.x += 0.2;
                break;
            
            // ROTACIÓN
            case 'q':
            case 'Q':
                cubo.rotation.y -= 0.1;
                break;
            case 'e':
            case 'E':
                cubo.rotation.y += 0.1;
                break;
            
            // ESCALADO
            case 'z':
            case 'Z':
                cubo.scale.x += 0.1;
                cubo.scale.y += 0.1;
                cubo.scale.z += 0.1;
                break;
            case 'x':
            case 'X':
                cubo.scale.x = Math.max(0.2, cubo.scale.x - 0.1);
                cubo.scale.y = Math.max(0.2, cubo.scale.y - 0.1);
                cubo.scale.z = Math.max(0.2, cubo.scale.z - 0.1);
                break;
        }
    });
    
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    
    animate();
    
    // RESPONSIVE
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
